<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Coursework Management</title>
    <link rel="stylesheet" href="../css/index.css?v=1.1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../assets/iuea-logo.png" alt="IUEA Logo" style="max-height: 60px; width: 100%; background: white; padding: 10px; border-radius: 8px; object-fit: contain;">
            </div>
            <ul class="nav-links">
                <li class="nav-item active" onclick="showSection('overview')"><i class="fa-solid fa-shield-halved"></i> Overview</li>
                <li class="nav-item" onclick="showSection('users')"><i class="fa-solid fa-users"></i> Users</li>
                <li class="nav-item" onclick="showSection('courses')"><i class="fa-solid fa-book-open"></i> Courses</li>
                <li class="nav-item" onclick="logout()"><i class="fa-solid fa-sign-out-alt"></i> Logout</li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h2 style="font-size: 1.2rem; font-weight: 600;" id="section-title">System Administration</h2>
                </div>
                <div class="header-right">
                    <button class="theme-toggle"></button>
                    <div class="user-profile">
                        <div class="avatar" style="background-color: var(--text-main);" id="user-avatar-initial">A</div>
                        <div>
                            <div style="font-weight: 600; font-size: 0.875rem;" id="user-name-display">Admin</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);" id="user-role-display">Administrator</div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-area">
                <!-- Overview Section -->
                <section id="overview-section" class="dashboard-view">
                    <h1 class="page-title">System Overview</h1>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-info">
                                <h3>Total Courses</h3>
                                <p id="total-courses-count">0</p>
                            </div>
                            <div class="stat-icon"><i class="fa-solid fa-book"></i></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-info">
                                <h3>Total Users</h3>
                                <p>24</p>
                            </div>
                            <div class="stat-icon" style="color: var(--warning); background: rgba(245, 158, 11, 0.1);"><i class="fa-solid fa-users"></i></div>
                        </div>
                    </div>
                </section>

                <!-- Users Section -->
                <section id="users-section" class="dashboard-view" style="display: none;">
                    <h1 class="page-title">User Management</h1>
                    <div class="table-container">
                        <div class="table-header-bar">
                            <h3>All Users</h3>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="user-table-body">
                                <!-- Populated via JS -->
                            </tbody>
                        </table>
                    </div>
                </section>

                <!-- Courses Section -->
                <section id="courses-section" class="dashboard-view" style="display: none;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <h1 class="page-title" style="margin-bottom: 0;">Course Management</h1>
                        <button class="btn btn-primary" onclick="openCourseModal()">
                            <i class="fa-solid fa-plus"></i> New Course
                        </button>
                    </div>

                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Course Code</th>
                                    <th>Course Name</th>
                                    <th>Lecturer ID</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="course-table-body">
                                <!-- Populated via JS -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Create Course Modal -->
    <div class="modal-overlay" id="courseModal">
        <div class="modal">
            <h2 style="margin-bottom: 1.5rem;">Add New Course</h2>
            <form id="courseForm">
                <div class="form-group">
                    <label>Course Code</label>
                    <input type="text" id="courseCode" required placeholder="e.g. CS101">
                </div>
                <div class="form-group">
                    <label>Course Name</label>
                    <input type="text" id="courseName" required placeholder="Introduction to Computer Science">
                </div>
                <div class="form-group">
                    <label>Lecturer ID</label>
                    <input type="number" id="lecturerId" required>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="button" class="btn" style="background: var(--background); flex: 1; border: 1px solid var(--border);" onclick="closeCourseModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save Course</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await requireAuth('admin');
            if (user) {
                document.getElementById('user-avatar-initial').textContent = user.full_name.charAt(0).toUpperCase();
                loadCourses();
                loadUsers();
            }
        });

        function showSection(sectionId) {
            document.querySelectorAll('.dashboard-view').forEach(s => s.style.display = 'none');
            document.getElementById(`${sectionId}-section`).style.display = 'block';
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.textContent.toLowerCase().includes(sectionId)) {
                    item.classList.add('active');
                }
            });

            const titleMap = {
                'overview': 'System Overview',
                'users': 'User Management',
                'courses': 'Course Management'
            };
            document.getElementById('section-title').textContent = titleMap[sectionId] || 'Administration';
        }

        async function loadCourses() {
            try {
                const courses = await api.courses.getAll();
                const tbody = document.getElementById('course-table-body');
                tbody.innerHTML = '';
                
                document.getElementById('total-courses-count').textContent = courses.length;

                for (const course of courses) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${course.id}</td>
                        <td style="font-weight: 500;">${course.course_code}</td>
                        <td>${course.course_name}</td>
                        <td>${course.lecturer_id}</td>
                        <td>
                            <button class="btn btn-primary" style="padding: 0.25rem 0.5rem; background: var(--danger); font-size: 0.8rem;" onclick="deleteCourse(${course.id})">
                                Delete
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                }
            } catch(e) {
                console.error(e);
            }
        }

        async function loadUsers() {
            try {
                const response = await api.request('/users/');
                const tbody = document.getElementById('user-table-body');
                tbody.innerHTML = '';
                
                response.forEach(user => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${user.id}</td>
                        <td style="font-weight: 500;">${user.full_name}</td>
                        <td>${user.email}</td>
                        <td><span class="badge" style="background:rgba(30,41,59,0.1); color:var(--secondary);">${user.role}</span></td>
                        <td>
                            <button class="btn" style="padding: 0.25rem 0.5rem; border: 1px solid var(--border); font-size: 0.8rem;">Edit</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch(e) {
                console.error(e);
            }
        }

        function openCourseModal() {
            document.getElementById('courseModal').classList.add('active');
        }

        function closeCourseModal() {
            document.getElementById('courseModal').classList.remove('active');
            document.getElementById('courseForm').reset();
        }

        document.getElementById('courseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                course_code: document.getElementById('courseCode').value,
                course_name: document.getElementById('courseName').value,
                lecturer_id: parseInt(document.getElementById('lecturerId').value)
            };
            
            try {
                await api.courses.create(data);
                showToast('Course created successfully!');
                closeCourseModal();
                loadCourses();
            } catch(error) {
                console.error(error);
            }
        });

        async function deleteCourse(id) {
            if(confirm('Are you sure you want to delete this course?')) {
                try {
                    await api.request(`/courses/${id}`, { method: 'DELETE' });
                    showToast('Course deleted!');
                    loadCourses();
                } catch(e) {
                    console.error(e);
                }
            }
        }
    </script>
</body>
</html>
